name: cloudagi-fixed-system
description: Fixed CloudAGI paid orchestration flow

agents:
  orchestrator:
    template: github:abilityai/agent-corbin
    resources:
      cpu: "2"
      memory: "4g"
    folders:
      expose: true
      consume: true

  gpu-compute:
    template: github:abilityai/agent-ruby
    folders:
      expose: true
      consume: true

  ai-research:
    template: github:abilityai/agent-ruby
    folders:
      expose: true
      consume: true

  web-scraper:
    template: github:abilityai/agent-ruby
    folders:
      expose: true
      consume: true

  code-review:
    template: github:abilityai/agent-ruby
    folders:
      expose: true
      consume: true

  smart-search:
    template: github:abilityai/agent-ruby
    folders:
      expose: true
      consume: true

permissions:
  preset: full-mesh
